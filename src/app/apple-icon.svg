<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <rect width="180" height="180" fill="#DFE104"/>
  <!-- Four stacked bars = four three-month rotations. Top bar full-strength,
       lower three at reduced opacity to imply the rotation cadence. -->
  <rect x="28" y="34"  width="124" height="20" fill="#000000"/>
  <rect x="28" y="62"  width="124" height="20" fill="#000000" opacity="0.62"/>
  <rect x="28" y="90"  width="124" height="20" fill="#000000" opacity="0.62"/>
  <rect x="28" y="118" width="124" height="20" fill="#000000" opacity="0.62"/>
</svg>
