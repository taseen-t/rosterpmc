  <rect x="28" y="62"  width="124" height="20" rx="6" fill="#9CA3AF"/>
  <rect x="28" y="90"  width="124" height="20" rx="6" fill="#9CA3AF"/>
  <rect x="28" y="118" width="124" height="20" rx="6" fill="#9CA3AF"/>
</svg>
